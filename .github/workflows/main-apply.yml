name: "Terraform Apply & CodeDeploy (Main)"
on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

jobs:
  terraform-apply-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::145250404945:role/GitHubActionsRole
          aws-region: eu-west-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        working-directory: ./env/dev
        run: terraform init

      - name: Terraform Apply
        working-directory: ./env/dev
        run: terraform apply -auto-approve -no-color

      - name: Extract Target Variables from Terraform
        id: get-tf-outputs
        working-directory: ./env/dev
        run: |
          ECR_URL=$(terraform output -raw ecr_repository_url)
          ARTIFACT_BUCKET=$(terraform output -raw codedeploy_s3_bucket)
          
          echo "ECR_URL=$ECR_URL" >> $GITHUB_ENV
          echo "ARTIFACT_BUCKET=$ARTIFACT_BUCKET" >> $GITHUB_ENV

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, Tag, and Push Docker Image
        working-directory: ./app
        run: |
          docker build -t ${{ env.ECR_URL }}:latest .
          docker push ${{ env.ECR_URL }}:latest

      - name: Package CodeDeploy Artifact
        run: |
          mkdir -p deployment_artifact~

          echo "ECR_URL=${{ env.ECR_URL }}" >> deployment_artifact/.env
          echo "DB_HOST=${{ env.DB_HOST }}" >> deployment_artifact/.env
          
          cp appspec.yml deployment_artifact/
          cp -r scripts/ deployment_artifact/
          cd deployment_artifact
          zip -r ../deploy-${{ github.sha }}.zip .

      - name: Upload Artifact to S3
        run: |
          aws s3 cp deploy-${{ github.sha }}.zip s3://${{ env.ARTIFACT_BUCKET }}/deploy-${{ github.sha }}.zip

      - name: Deploy via AWS Systems Manager (SSM)
        run: |
          # 1. Extract dynamic variables from Terraform state
          INSTANCE_ID=$(terraform output -raw ec2_instance_id)
          DB_HOST=$(terraform output -raw db_endpoint)
          ECR_URL=$(terraform output -raw ecr_repository_url)

          echo "Triggering SSM Run Command on Instance: $INSTANCE_ID"

          # 2. Push the deployment commands directly to the secure EC2 boundary
          aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --parameters commands=[ \
              "echo 'Authenticating with ECR...'", \
              "aws ecr get-login-password --region eu-west-1 | docker login --username AWS --password-stdin $ECR_URL", \
              "echo 'Pulling latest image...'", \
              "docker pull $ECR_URL:latest", \
              "echo 'Fetching Zero-Knowledge credentials and starting container...'", \
              "RAW_SECRET=\$(aws secretsmanager get-secret-value --secret-id dev-postgres-credentials --query SecretString --output text --region eu-west-1)", \
              "PARSED_PASS=\$(echo \$RAW_SECRET | jq -r .password)", \
              "docker stop flask-app || true", \
              "docker rm flask-app || true", \
              "docker run -d --name flask-app -p 80:80 -e DB_HOST=$DB_HOST -e DB_USER=dbadmin -e DB_NAME=postgres -e DB_PASS=\"\$PARSED_PASS\" $ECR_URL:latest", \
              "sleep 15", \
              "docker exec flask-app python /app/seed_db.py" \
            ] \
            --comment "Automated CI/CD Deployment via SSM"