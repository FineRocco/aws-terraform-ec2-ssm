name: "Terraform Apply & CodeDeploy (Main)"
on:
  push:
    branches:
      - main
    paths-ignore:
      - 'README.md'
      - '.gitignore'

permissions:
  id-token: write
  contents: read

jobs:
  terraform-apply-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::145250404945:role/GitHubActionsRole
          aws-region: eu-west-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        working-directory: ./env/dev
        run: terraform init

      - name: Terraform Apply
        working-directory: ./env/dev
        run: terraform apply -auto-approve -no-color

      - name: Extract Target Variables from Terraform
        id: get-tf-outputs
        working-directory: ./env/dev
        run: |
          ECR_URL=$(terraform output -raw ecr_repository_url)
          
          echo "ECR_URL=$ECR_URL" >> $GITHUB_ENV

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, Tag, and Push Docker Image
        working-directory: ./app
        run: |
          docker build -t ${{ env.ECR_URL }}:latest .
          docker push ${{ env.ECR_URL }}:latest

      - name: Deploy via AWS Systems Manager (SSM)
        working-directory: ./env/dev
        run: |
          # 1. Extract dynamic variables from Terraform state
          INSTANCE_ID=$(terraform output -raw dev_ec2_instance_id)
          DB_HOST=$(terraform output -raw dev_db_endpoint | cut -d ':' -f 1)
          ECR_URL=$(terraform output -raw ecr_repository_url)

          echo "Triggering SSM Run Command on Instance: $INSTANCE_ID"

          # 2. Push the deployment commands directly to the secure EC2 boundary
          aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --comment "Automated CI/CD Deployment via SSM" \
            --parameters '{"commands":[
              "echo Authenticating with ECR...",
              "aws ecr get-login-password --region eu-west-1 | docker login --username AWS --password-stdin '"$ECR_URL"'",
              "echo Pulling latest image...",
              "docker pull '"$ECR_URL"':latest",
              "echo Fetching Zero-Knowledge credentials...",
              "RAW_SECRET=$(aws secretsmanager get-secret-value --secret-id dev-postgres-credentials --query SecretString --output text --region eu-west-1)",
              "PARSED_PASS=$(echo $RAW_SECRET | jq -r .password)",
              "echo Booting container...",
              "docker stop flask-app || true",
              "docker rm flask-app || true",
              "docker run -d --name flask-app -p 80:80 -e DB_HOST='"$DB_HOST"' -e DB_USER=dbadmin -e DB_NAME=postgres -e DB_PASS=\"$PARSED_PASS\" '"$ECR_URL"':latest",
              "sleep 15",
              "docker exec flask-app python /app/seed_db.py"
            ]}'
