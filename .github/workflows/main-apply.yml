name: "Terraform Apply (Main)"
on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

jobs:
  terraform-apply:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::145250404945:role/GitHubActionsRole
          aws-region: eu-west-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        working-directory: ./env/dev
        run: terraform init

      - name: Terraform Apply
        working-directory: ./env/dev
        run: terraform apply -auto-approve -no-color

      - name: Extract ECR URL from Terraform Outputs
        id: get-ecr-url
        working-directory: ./env/dev
        run: |
          ECR_URL=$(terraform output -raw ecr_repository_url)
          INSTANCE_ID=$(terraform output -raw dev_ec2_instance_id)

          DB_ENDPOINT_RAW=$(terraform output -raw dev_db_endpoint)
          DB_HOST=$(echo $DB_ENDPOINT_RAW | cut -d':' -f1)  

          echo "ECR_URL=$ECR_URL" >> $GITHUB_ENV
          echo "INSTANCE_ID=$INSTANCE_ID" >> $GITHUB_ENV
          echo "DB_HOST=$DB_HOST" >> $GITHUB_ENV

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, Tag, and Push Docker Image
        working-directory: ./app
        run: |
          # Build the image using the dynamically fetched URL
          docker build -t ${{ env.ECR_URL }}:latest .
          
          # Push the image to AWS ECR
          docker push ${{ env.ECR_URL }}:latest

      - name: Deploy Container to EC2 via AWS SSM
        run: |
          echo "Sending deployment command to EC2 Instance: ${{ env.INSTANCE_ID }}"
          
          # Send the script to the EC2 server
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "${{ env.INSTANCE_ID }}" \
            --document-name "AWS-RunShellScript" \
            --comment "Pull and run the latest Docker image" \
            --parameters 'commands=[
              "aws ecr get-login-password --region eu-west-1 | sudo docker login --username AWS --password-stdin ${{ env.ECR_URL }}",
              "sudo docker stop flask-app || true",
              "sudo docker rm flask-app || true",
              "sudo docker pull ${{ env.ECR_URL }}:latest",
              "sudo docker run -d --name flask-app -p 80:80 -e DB_HOST=${{ env.DB_ENDPOINT }} -e DB_PASSWORD=${{ env.DB_PASS }} ${{ env.ECR_URL }}:latest"
              "sleep 5",
              "sudo docker exec flask-app python /app/seed_db.py"
            ]' \
            --output text --query "Command.CommandId")
          
          echo "Command dispatched. Waiting for execution to complete..."
          
          # Force GitHub Actions to wait for the command to finish so we get real-time success/failure logs
          aws ssm wait command-executed --command-id "$COMMAND_ID" --instance-id "${{ env.INSTANCE_ID }}"
          
          echo "Deployment successful!"