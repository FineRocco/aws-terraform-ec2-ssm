name: Destroy Infrastructure

on:
  workflow_dispatch: 

permissions:
  id-token: write
  contents: read

jobs:
  destroy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::145250404945:role/GitHubActionsRole
          aws-region: eu-west-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        working-directory: ./env/dev
        run: terraform init

      - name: Purge ECR Image Registry
        run: |
          echo "Attempting to delete the 'latest' image from ECR to prevent deletion blocks..."
          aws ecr batch-delete-image --repository-name dev-flask-app --image-ids imageTag=latest --region eu-west-1 || true

      - name: Terraform Destroy
        working-directory: ./env/dev
        run: terraform destroy -auto-approve -no-color